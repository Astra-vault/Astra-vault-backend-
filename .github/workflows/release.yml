name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: astra-vault-backend
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: astra-vault-backend
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: astra-vault-backend.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: astra-vault-backend
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: astra-vault-backend

    steps:
    - uses: actions/checkout@v6
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Install cross-compilation tools
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
    
    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2
    
    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }}
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    
    - name: Package binary (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        tar czvf ../../../astra-vault-backend-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}
        cd -
    
    - name: Package binary (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        7z a ../../../astra-vault-backend-${{ matrix.target }}.zip ${{ matrix.binary_name }}
        cd -
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: astra-vault-backend-${{ matrix.target }}
        path: |
          astra-vault-backend-*.tar.gz
          astra-vault-backend-*.zip

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: astra-vault-backend-*
        merge-multiple: true
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
